services:
  gateway-proxy:
    image: nginx:alpine
    container_name: bazos-service-gateway-proxy-green
    # Port mapping for health checks only - gateway-proxy is accessed via Docker network (http://gateway-proxy)
    # Host port 3904 (available in 34xx range, mapped to container port 80
    ports:
      - "${GATEWAY_PROXY_PORT:-3904}:80"
    volumes:
      - ./nginx/gateway-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginx-network
    depends_on:
      - bazos
      - settings
      - imports
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: '0.25'
        reservations:
          memory: 20M
    # Note: nginx configuration uses dynamic DNS resolution (resolver + variables in proxy_pass)
    # This prevents stale IP caching when services restart and get new IP addresses
    # DNS is re-resolved every 10 seconds, and variables in proxy_pass force resolution on each request
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--tries=1", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: bazos-service-api-gateway-green
    ports:
      - "${API_GATEWAY_PORT:-3901}:3901"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_NAME=${SERVICE_NAME:-bazos-service}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-3901}
      - BAZOS_SERVICE_URL=${BAZOS_SERVICE_URL:-http://bazos:3900}
      - IMPORT_SERVICE_URL=${IMPORT_SERVICE_URL:-http://imports:3902}
      - SETTINGS_SERVICE_URL=${SETTINGS_SERVICE_URL:-http://settings:3903}
      - BAZOS_SETTINGS_SERVICE_PORT=${BAZOS_SETTINGS_SERVICE_PORT:-3903}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT}
      - GATEWAY_TIMEOUT=${GATEWAY_TIMEOUT}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-bazos}
      - DATABASE_URL=${DATABASE_URL}
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '0.5'
        reservations:
          memory: 70M
    networks:
      - nginx-network
    depends_on:
      - gateway-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3901/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bazos:
    build:
      context: .
      dockerfile: services/bazos-service/Dockerfile
    container_name: bazos-service-green
    ports:
      - "${BAZOS_SERVICE_PORT:-3900}:3900"
    volumes:
      - ./logs:/app/logs

    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_NAME=${SERVICE_NAME:-bazos-service}
      - BAZOS_SERVICE_PORT=${BAZOS_SERVICE_PORT:-3900}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL}
      - BAZOS_CLIENT_ID=${BAZOS_CLIENT_ID}
      - BAZOS_CLIENT_SECRET=${BAZOS_CLIENT_SECRET}
      - BAZOS_REDIRECT_URI=${BAZOS_REDIRECT_URI}
      - BAZOS_AUTH_URL=${BAZOS_AUTH_URL:-https://bazos.pl/auth/oauth/token}
      - BAZOS_AUTH_SANDBOX_URL=${BAZOS_AUTH_SANDBOX_URL}
      - BAZOS_OAUTH_AUTHORIZE_URL=${BAZOS_OAUTH_AUTHORIZE_URL}
      - BAZOS_OAUTH_TOKEN_URL=${BAZOS_OAUTH_TOKEN_URL}
      - BAZOS_API_URL=${BAZOS_API_URL:-https://api.bazos.pl}
      - BAZOS_API_SANDBOX_URL=${BAZOS_API_SANDBOX_URL}
      - BAZOS_USE_SANDBOX=${BAZOS_USE_SANDBOX:-false}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CATALOG_SERVICE_URL=${CATALOG_SERVICE_URL:-http://catalog-microservice:3200}
      - WAREHOUSE_SERVICE_URL=${WAREHOUSE_SERVICE_URL:-http://warehouse-microservice:3201}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL:-http://orders-microservice:3203}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@statex_rabbitmq:5672}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-bazos}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '0.5'
        reservations:
          memory: 70M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3900/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  imports:
    build:
      context: .
      dockerfile: services/imports/Dockerfile
    container_name: bazos-service-imports-green
    ports:
      - "${IMPORT_SERVICE_PORT:-3902}:3902"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_NAME=${SERVICE_NAME:-bazos-service}
      - IMPORT_SERVICE_PORT=${IMPORT_SERVICE_PORT:-3902}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL}
      - BAZOS_SERVICE_URL=${BAZOS_SERVICE_URL:-http://bazos:3900}
      - IMPORT_CSV_MAX_SIZE=${IMPORT_CSV_MAX_SIZE:-104857600}
      - IMPORT_CSV_BATCH_SIZE=${IMPORT_CSV_BATCH_SIZE:-50}
      - NOTIFICATION_ORDER_CREATED=${NOTIFICATION_ORDER_CREATED:-true}
      - NOTIFICATION_ORDER_UPDATED=${NOTIFICATION_ORDER_UPDATED:-true}
      - NOTIFICATION_STOCK_LOW=${NOTIFICATION_STOCK_LOW:-true}
      - NOTIFICATION_EMAIL_TO=${NOTIFICATION_EMAIL_TO}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-bazos}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '0.5'
        reservations:
          memory: 70M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3902/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  settings:
    build:
      context: .
      dockerfile: services/settings/Dockerfile
    container_name: bazos-service-settings-green
    ports:
      - "${BAZOS_SETTINGS_SERVICE_PORT:-3903}:3903"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_NAME=${SERVICE_NAME:-bazos-service}
      - BAZOS_SETTINGS_SERVICE_PORT=${BAZOS_SETTINGS_SERVICE_PORT:-3903}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT}
      - AUTH_SERVICE_TIMEOUT=${AUTH_SERVICE_TIMEOUT}
      - BAZOS_AUTH_URL=${BAZOS_AUTH_URL:-https://bazos.pl/auth/oauth/token}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-bazos}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '0.5'
        reservations:
          memory: 70M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3903/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        - FRONTEND_API_URL=${FRONTEND_API_URL}
    container_name: bazos-service-frontend-green
    ports:
      - "${BAZOS_FRONTEND_SERVICE_PORT:-3905}:3905"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: '0.5'
        reservations:
          memory: 50M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3905/health"]
      interval: 10s
      timeout: 10s
      retries: 2
      start_period: 10s

networks:
  nginx-network:
    external: true
    name: nginx-network
