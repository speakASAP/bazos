apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazos-service
  namespace: statex-apps
  labels:
    app: bazos-service
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazos-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bazos-service
    spec:
      containers:
        - name: app
          # :latest image failed Prisma client init; rebuild after Dockerfile fix, then retag :latest
          image: localhost:5000/bazos-service:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 3900
              name: http
          envFrom:
            - configMapRef:
                name: bazos-config
            - secretRef:
                name: bazos-service-secret
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: DB_PASSWORD
          startupProbe:
            httpGet:
              path: /health
              port: 3900
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3900
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3900
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
