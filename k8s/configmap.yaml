apiVersion: v1
kind: ConfigMap
metadata:
  name: bazos-config
  namespace: statex-apps
  labels:
    app: bazos-service
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "bazos-service"
  DOMAIN: "bazos.alfares.cz"
  PORT: "3900"
  BAZOS_SERVICE_PORT: "3900"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "bazos"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  LOGGING_SERVICE_URL: "http://logging-microservice:3367"
  HTTP_TIMEOUT: "30000"
  GATEWAY_TIMEOUT: "30000"
